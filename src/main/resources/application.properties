# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/salutis_dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# JWT
jwt.secret=${JWT_SECRET:thisisasecuredevjwtkeywith32bytesforhmacsha256testing12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

# App
spring.application.name=${APP_NAME:Salutis}
server.port=${PORT:8080}

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.backend=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL:INFO}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs




